<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HuronWest — Client Portal</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<!-- Firebase SDK — enables real-time updates without page reload -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

<style>
  :root {
    --forest:     #1A3C34;
    --forest-mid: #224A40;
    --forest-lt:  #2D5E51;
    --sage:       #5B8C7E;
    --mint:       #A8D5BA;
    --mint-pale:  #E8F5EC;
    --leaf:       #3A7D44;
    --leaf-hover: #2E6B38;
    --cream:      #F7FAF8;
    --page-bg:    #F0F4F1;
    --white:      #FFFFFF;
    --bark:       #3E4A47;
    --bark-lt:    #7A8B85;
    --border:     #D5E5DC;
    --border-lt:  #E8EFE9;
    --red:        #C62828;
    --yellow:     #F57F17;
    --shadow:     0 1px 3px rgba(26,60,52,0.07);
    --shadow-md:  0 4px 16px rgba(26,60,52,0.10);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--page-bg);
    font-family: 'Outfit', sans-serif;
    color: var(--forest);
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }

  /* ── Header ── */
  .header {
    background: var(--forest);
    padding: 0 32px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo { font-family: 'DM Serif Display', serif; font-size: 18px; color: #fff; }
  .logo span { color: var(--mint); }
  .header-right { font-size: 12px; color: rgba(255,255,255,0.5); }
  .live-dot {
    display: inline-block; width: 7px; height: 7px; border-radius: 50%;
    background: var(--mint); margin-right: 6px;
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

  /* ── Layout ── */
  .container { max-width: 960px; margin: 0 auto; padding: 32px 24px; }

  /* ── Property hero ── */
  .hero {
    background: var(--white); border: 1px solid var(--border-lt);
    border-radius: 4px; overflow: hidden; margin-bottom: 20px;
    box-shadow: var(--shadow);
  }
  .hero-header {
    background: var(--forest); padding: 28px 32px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .hero-title { font-family: 'DM Serif Display', serif; font-size: 24px; color: #fff; margin-bottom: 4px; }
  .hero-sub   { font-size: 13px; color: var(--mint); letter-spacing: 0.5px; }
  .hero-badge {
    background: rgba(168,213,186,0.15); border: 1px solid rgba(168,213,186,0.3);
    color: var(--mint); font-size: 11px; font-weight: 600;
    padding: 6px 14px; border-radius: 20px; text-transform: uppercase; letter-spacing: 1px;
  }
  .hero-body { padding: 24px 32px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }
  .stat-label { font-size: 10px; font-weight: 700; color: var(--bark-lt); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 4px; }
  .stat-value { font-family: 'JetBrains Mono', monospace; font-size: 16px; font-weight: 500; color: var(--forest); }

  /* ── Grid ── */
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }

  /* ── Cards ── */
  .card {
    background: var(--white); border: 1px solid var(--border-lt);
    border-radius: 4px; padding: 24px; box-shadow: var(--shadow); margin-bottom: 20px;
  }
  .card-header {
    font-size: 10px; font-weight: 700; color: var(--bark-lt);
    text-transform: uppercase; letter-spacing: 1.5px;
    margin-bottom: 16px; padding-bottom: 10px;
    border-bottom: 1px solid var(--border-lt);
    display: flex; align-items: center; justify-content: space-between;
  }
  .card-header-ct { font-size: 11px; color: var(--sage); font-weight: 500; letter-spacing: 0; }

  /* ── Crew card ── */
  .crew-name { font-family: 'DM Serif Display', serif; font-size: 20px; color: var(--forest); margin-bottom: 4px; }
  .crew-role { font-size: 12px; color: var(--bark-lt); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 16px; }
  .crew-contact a {
    display: flex; align-items: center; gap: 10px; padding: 10px 0;
    border-bottom: 1px solid var(--border-lt); color: var(--leaf);
    font-size: 13px; font-weight: 500; text-decoration: none;
  }
  .crew-contact a:last-child { border-bottom: none; }
  .crew-contact a:hover { color: var(--leaf-hover); }
  .contact-icon {
    width: 30px; height: 30px; border-radius: 15px; background: var(--mint-pale);
    display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0;
  }

  /* ── Schedule ── */
  .next-service-date { font-family: 'DM Serif Display', serif; font-size: 32px; color: var(--leaf); margin: 8px 0 4px; }
  .schedule-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border-lt); font-size: 13px; }
  .schedule-row:last-child { border-bottom: none; }
  .schedule-row span:last-child { font-weight: 600; color: var(--forest); font-family: 'JetBrains Mono', monospace; font-size: 12px; }

  /* ── Notes ── */
  .notes-box { background: var(--mint-pale); border: 1px solid var(--border); border-radius: 4px; padding: 14px 16px; font-size: 13px; color: var(--forest); line-height: 1.6; }

  /* ── Visit timeline ── */
  .visit-item { padding: 20px 0; border-bottom: 1px solid var(--border-lt); }
  .visit-item:last-child { border-bottom: none; padding-bottom: 0; }
  .visit-hdr { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
  .visit-date { font-size: 15px; font-weight: 700; color: var(--forest); }
  .visit-crew { font-size: 11px; color: var(--bark-lt); background: var(--border-lt); padding: 3px 10px; border-radius: 10px; }
  .visit-general-note { font-size: 13px; color: var(--bark); line-height: 1.6; background: var(--mint-pale); border: 1px solid var(--border); border-radius: 4px; padding: 10px 12px; margin-top: 10px; }

  /* Scope sections inside a visit */
  .scope-section { margin-bottom: 14px; }
  .scope-section:last-child { margin-bottom: 0; }
  .scope-section-title {
    font-size: 10px; font-weight: 700; color: var(--bark-lt);
    text-transform: uppercase; letter-spacing: 1.3px;
    margin-bottom: 8px; display: flex; align-items: center; gap: 6px;
  }
  .scope-section-title::after { content: ''; flex: 1; height: 1px; background: var(--border-lt); }
  .scope-note { font-size: 12px; color: var(--bark); line-height: 1.5; margin-bottom: 8px; font-style: italic; }
  .visit-photos { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
  .visit-photo { aspect-ratio: 1; border-radius: 4px; overflow: hidden; cursor: zoom-in; background: var(--border-lt); position: relative; }
  .visit-photo img { width: 100%; height: 100%; object-fit: cover; transition: transform .25s; display: block; }
  .visit-photo:hover img { transform: scale(1.06); }
  .visit-photo-overlay { position: absolute; inset: 0; background: rgba(26,60,52,0); transition: background .2s; display: flex; align-items: center; justify-content: center; }
  .visit-photo:hover .visit-photo-overlay { background: rgba(26,60,52,0.18); }
  .more-photos-tile {
    aspect-ratio: 1; border-radius: 4px; background: var(--forest); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 700; color: var(--mint); transition: background .2s;
  }
  .more-photos-tile:hover { background: var(--forest-lt); }
  .no-visits { padding: 20px 0; text-align: center; color: var(--bark-lt); font-size: 14px; }

  /* ── Static photos ── */
  .photo-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
  .photo-item { aspect-ratio: 4/3; border-radius: 4px; overflow: hidden; background: var(--border-lt); cursor: pointer; }
  .photo-item img { width: 100%; height: 100%; object-fit: cover; transition: transform .3s; }
  .photo-item:hover img { transform: scale(1.04); }

  /* ── Lightbox ── */
  .lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.88); z-index: 9999; align-items: center; justify-content: center; }
  .lightbox.open { display: flex; }
  .lightbox img { max-width: 90vw; max-height: 88vh; border-radius: 4px; box-shadow: 0 24px 60px rgba(0,0,0,0.5); }
  .lightbox-close { position: absolute; top: 20px; right: 28px; color: #fff; font-size: 32px; cursor: pointer; opacity: 0.7; }
  .lightbox-close:hover { opacity: 1; }
  .lightbox-prev, .lightbox-next {
    position: absolute; top: 50%; transform: translateY(-50%);
    color: #fff; font-size: 28px; cursor: pointer; opacity: 0.6;
    padding: 12px; user-select: none;
  }
  .lightbox-prev { left: 16px; }
  .lightbox-next { right: 16px; }
  .lightbox-prev:hover, .lightbox-next:hover { opacity: 1; }

  /* ── Message form ── */
  .msg-thread { margin-bottom: 20px; max-height: 420px; overflow-y: auto; }
  .msg-bubble { padding: 12px 16px; border-radius: 4px; margin-bottom: 10px; font-size: 13px; line-height: 1.5; }
  .msg-from-client { background: var(--mint-pale); border: 1px solid var(--border); }
  .msg-from-hw { background: var(--forest); color: #fff; }
  .msg-meta { font-size: 11px; opacity: 0.6; margin-bottom: 4px; }
  .msg-reply { margin-top: 10px; padding: 10px; background: rgba(255,255,255,0.12); border-radius: 3px; }
  .msg-reply-meta { font-size: 11px; opacity: 0.7; margin-bottom: 3px; }
  .empty-msgs { padding: 20px 0; text-align: center; color: var(--bark-lt); font-size: 13px; }

  textarea.msg-input {
    width: 100%; min-height: 88px; padding: 12px 14px;
    border: 1px solid var(--border); border-radius: 4px;
    font-family: 'Outfit', sans-serif; font-size: 14px;
    color: var(--forest); background: var(--white);
    resize: vertical; outline: none; transition: border-color .15s;
  }
  textarea.msg-input:focus { border-color: var(--leaf); }
  input.name-input {
    width: 100%; padding: 10px 14px; margin-bottom: 10px;
    border: 1px solid var(--border); border-radius: 4px;
    font-family: 'Outfit', sans-serif; font-size: 14px;
    color: var(--forest); background: var(--white); outline: none;
    transition: border-color .15s;
  }
  input.name-input:focus { border-color: var(--leaf); }
  .send-btn {
    margin-top: 10px; padding: 11px 24px;
    background: var(--leaf); color: #fff; border: none; border-radius: 4px;
    font-family: 'Outfit', sans-serif; font-size: 13px; font-weight: 600;
    cursor: pointer; text-transform: uppercase; letter-spacing: 1px;
    transition: background .15s;
  }
  .send-btn:hover { background: var(--leaf-hover); }
  .send-btn:disabled { opacity: 0.5; cursor: default; }

  /* ── Loading / error ── */
  .loading { text-align: center; padding: 80px 24px; }
  .loading-title { font-family: 'DM Serif Display', serif; font-size: 28px; color: var(--forest); margin-bottom: 12px; }
  .loading-sub { font-size: 14px; color: var(--bark-lt); }
  .error-box { background: #FFEBEE; border: 1px solid #EF9A9A; border-radius: 4px; padding: 20px 24px; text-align: center; color: var(--red); font-size: 14px; }

  /* ── Toast ── */
  #toast { position: fixed; bottom: 24px; right: 24px; padding: 12px 20px; background: var(--leaf); color: #fff; border-radius: 4px; font-size: 13px; font-weight: 600; box-shadow: var(--shadow-md); opacity: 0; transition: opacity .3s; z-index: 9999; pointer-events: none; }
  #toast.show { opacity: 1; }

  @media (max-width: 640px) {
    .hero-body { grid-template-columns: 1fr 1fr; }
    .grid2 { grid-template-columns: 1fr; }
    .photo-grid { grid-template-columns: 1fr 1fr; }
    .visit-photos { grid-template-columns: repeat(3, 1fr); }
    .header { padding: 0 16px; }
    .container { padding: 20px 14px; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="logo">Huron<span>West</span> Facility Services</div>
  <div class="header-right"><span class="live-dot"></span>Live</div>
</div>

<div id="loading" class="container">
  <div class="loading">
    <div class="loading-title">Loading your portal…</div>
    <div class="loading-sub">Fetching property details</div>
  </div>
</div>

<div id="app" class="container" style="display:none"></div>
<div id="lightbox" class="lightbox">
  <span class="lightbox-close" onclick="closeLightbox()">✕</span>
  <span class="lightbox-prev" onclick="lightboxStep(-1)">‹</span>
  <img id="lightbox-img" src="" alt="">
  <span class="lightbox-next" onclick="lightboxStep(1)">›</span>
</div>
<div id="toast"></div>

<script>
// ── Config ─────────────────────────────────────────────────────────────────
var cfg = null;
var db  = null;
var jobId = null;
var lightboxUrls = [];
var lightboxIdx  = 0;
// Photo sets for lightbox — populated when visits render, avoids JSON in onclick
var _lbSets = [];
var _visitsCache = [];  // stored for PDF download
var _portalJobName = '';

function getJobId() {
  // Try query string (?job=...)
  var fromQuery = new URLSearchParams(window.location.search).get('job');
  if (fromQuery) return fromQuery;
  // Try path-based URL (/portal/:jobId) — Vercel rewrites server-side so window.location still shows the path
  var match = window.location.pathname.match(/\/portal\/([^\/\?]+)/);
  return match ? match[1] : null;
}

async function getConfig() {
  // 1. Try fetching from server (Vercel env vars — works for any visitor)
  try {
    var res = await fetch('/api/cfg');
    if (res.ok) {
      var data = await res.json();
      if (data && data.apiKey) {
        try { localStorage.setItem('hwfs-fb-config', JSON.stringify(data)); } catch(e) {}
        return data;
      }
    }
  } catch(e) {}
  // 2. Fall back to localStorage (e.g. offline or API not configured yet)
  try { return JSON.parse(localStorage.getItem('hwfs-fb-config')); } catch(e) { return null; }
}

// ── Firebase init ──────────────────────────────────────────────────────────
function initFirebase(config) {
  try {
    if (!firebase.apps.length) firebase.initializeApp(config);
    db = firebase.database();
    return true;
  } catch(e) {
    console.error('Firebase init failed:', e);
    return false;
  }
}

// ── Formatters ─────────────────────────────────────────────────────────────
function fmt(n)      { return '$' + Number(n||0).toLocaleString('en-US', {minimumFractionDigits:0,maximumFractionDigits:0}); }
function fmtDate(d)  { if (!d) return '—'; try { return new Date(d+'T12:00:00').toLocaleDateString('en-US', {weekday:'long',month:'long',day:'numeric',year:'numeric'}); } catch{return d;} }
function fmtShort(d) { if (!d) return '—'; try { return new Date(d).toLocaleDateString('en-US', {weekday:'short',month:'short',day:'numeric'}); } catch{return d;} }
function timeAgo(ts) { if (!ts) return ''; var d=Math.floor((Date.now()-new Date(ts))/60000); if(d<1)return'just now'; if(d<60)return d+'m ago'; if(d<1440)return Math.floor(d/60)+'h ago'; return Math.floor(d/1440)+'d ago'; }
function esc(s)      { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>'); }

// ── Lightbox ───────────────────────────────────────────────────────────────
function openLightbox(urls, idx) {
  lightboxUrls = Array.isArray(urls) ? urls.filter(Boolean) : [urls];
  lightboxIdx  = idx || 0;
  document.getElementById('lightbox-img').src = lightboxUrls[lightboxIdx];
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow = 'hidden';
}
// Called from visit photos via safe index into _lbSets
function openSet(setIdx, photoIdx) {
  openLightbox(_lbSets[setIdx] || [], photoIdx || 0);
}
function lightboxStep(dir) {
  lightboxIdx = (lightboxIdx + dir + lightboxUrls.length) % lightboxUrls.length;
  document.getElementById('lightbox-img').src = lightboxUrls[lightboxIdx];
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow = '';
}
document.getElementById('lightbox').addEventListener('click', function(e) { if (e.target === this) closeLightbox(); });

// ── Render static page frame ───────────────────────────────────────────────
function renderFrame(job) {
  _portalJobName = job.propertyName || job.name || 'Property';
  var photos     = Array.isArray(job.photos) ? job.photos.filter(Boolean) : [];
  var monthlyRate = (job.wkRate || 0) * 4.33;
  var html = '';

  // Hero
  html += '<div class="hero">';
  html += '<div class="hero-header">';
  html += '<div><div class="hero-title">' + esc(job.propertyName) + '</div><div class="hero-sub">' + esc(job.client) + ' · ' + esc(job.tier) + ' Service</div></div>';
  html += '<div class="hero-badge">Active Contract</div>';
  html += '</div>';
  html += '<div class="hero-body">';
  html += '<div class="stat-cell"><div class="stat-label">Service Tier</div><div class="stat-value">' + esc(job.tier) + '</div></div>';
  html += '<div class="stat-cell"><div class="stat-label">Frequency</div><div class="stat-value">' + (job.freq||1) + 'x / week</div></div>';
  html += '<div class="stat-cell"><div class="stat-label">Monthly Rate</div><div class="stat-value">' + fmt(monthlyRate) + '</div></div>';
  html += '<div class="stat-cell"><div class="stat-label">Start Date</div><div class="stat-value">' + (job.start||'—') + '</div></div>';
  html += '</div></div>';

  // Grid: crew + schedule
  html += '<div class="grid2">';

  // Crew card
  html += '<div class="card">';
  html += '<div class="card-header">Your Crew Lead</div>';
  if (job.crewLead) {
    html += '<div class="crew-name">' + esc(job.crewLead) + '</div>';
    html += '<div class="crew-role">Crew Lead · HuronWest Facility Services</div>';
    html += '<div class="crew-contact">';
    if (job.crewPhone) html += '<a href="tel:' + esc(job.crewPhone) + '"><div class="contact-icon">📞</div>' + esc(job.crewPhone) + '</a>';
    if (job.crewEmail) html += '<a href="mailto:' + esc(job.crewEmail) + '"><div class="contact-icon">✉</div>' + esc(job.crewEmail) + '</a>';
    html += '</div>';
  } else {
    html += '<div style="color:var(--bark-lt);font-size:13px;">Crew information coming soon.</div>';
  }
  html += '</div>';

  // Schedule card
  html += '<div class="card">';
  html += '<div class="card-header">Service Schedule</div>';
  if (job.nextService) {
    html += '<div style="font-size:11px;color:var(--bark-lt);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;">Next Service</div>';
    html += '<div class="next-service-date">' + fmtDate(job.nextService) + '</div>';
  }
  html += '<div style="margin-top:16px;">';
  html += '<div class="schedule-row"><span>Visits per week</span><span>' + (job.freq||1) + 'x</span></div>';
  html += '<div class="schedule-row"><span>Sq footage serviced</span><span>' + (job.sf ? Number(job.sf).toLocaleString()+' sf' : '—') + '</span></div>';
  if (job.billingNotes) html += '<div class="schedule-row"><span>Billing</span><span style="font-family:Outfit,sans-serif;font-size:13px;">' + esc(job.billingNotes) + '</span></div>';
  html += '</div></div>';

  html += '</div>'; // grid2

  // Notes
  if (job.clientNotes) {
    html += '<div class="card"><div class="card-header">Property Notes</div>';
    html += '<div class="notes-box">📋 ' + esc(job.clientNotes) + '</div></div>';
  }

  // Service history placeholder (filled by real-time listener)
  html += '<div class="card" id="visits-card">';
  html += '<div class="card-header" style="display:flex;justify-content:space-between;align-items:center;">';
  html += '<span>Service History <span class="card-header-ct" id="visits-ct"></span></span>';
  html += '<button onclick="downloadServiceHistory()" id="dl-visits-btn" style="display:none;background:var(--leaf);color:#fff;border:none;border-radius:6px;padding:6px 14px;font-size:12px;font-weight:600;cursor:pointer;font-family:Outfit,sans-serif;">⬇ Download PDF</button>';
  html += '</div>';
  html += '<div id="visits-body"><div class="no-visits">Loading service history…</div></div>';
  html += '</div>';

  // Property photos (manually set by ERP — reference/promo photos)
  if (photos.length > 0) {
    html += '<div class="card"><div class="card-header">Property Photos (' + photos.length + ')</div>';
    html += '<div class="photo-grid">';
    var propSetIdx = _lbSets.length;
    _lbSets.push(photos);
    photos.forEach(function(url, i) {
      html += '<div class="photo-item" onclick="openSet(' + propSetIdx + ',' + i + ')">';
      html += '<img src="' + esc(url) + '" alt="Photo ' + (i+1) + '" loading="lazy" onerror="this.parentNode.style.display=\'none\'">';
      html += '</div>';
    });
    html += '</div></div>';
  }

  // Messages placeholder (filled by real-time listener)
  html += '<div class="card" id="msg-card">';
  html += '<div class="card-header">Messages</div>';
  html += '<div id="msg-thread" class="msg-thread"></div>';
  html += '<div id="msg-form">';
  html += '<input class="name-input" id="msg-name" type="text" placeholder="Your name" />';
  html += '<textarea class="msg-input" id="msg-text" placeholder="Type your message to HuronWest…"></textarea>';
  html += '<button class="send-btn" id="send-btn" onclick="doSend()">Send Message</button>';
  html += '</div></div>';

  document.getElementById('app').innerHTML = html;
  document.getElementById('app').style.display = 'block';
  document.getElementById('loading').style.display = 'none';

  // Restore saved name
  var savedName = localStorage.getItem('hwfs-portal-name');
  if (savedName) document.getElementById('msg-name').value = savedName;
}

// ── Update visits section (called by real-time listener) ──────────────────
function updateVisits(snap) {
  var body = document.getElementById('visits-body');
  var ct   = document.getElementById('visits-ct');
  if (!body) return;

  var data   = snap.val();
  var visits = data ? Object.values(data) : [];
  visits.sort(function(a,b){ return (b.ts||'').localeCompare(a.ts||''); });
  _visitsCache = visits;

  if (ct) ct.textContent = visits.length ? visits.length + ' visit' + (visits.length!==1?'s':'') : '';

  var dlBtn = document.getElementById('dl-visits-btn');
  if (dlBtn) dlBtn.style.display = visits.length ? 'inline-block' : 'none';

  if (!visits.length) {
    body.innerHTML = '<div class="no-visits">No service visits recorded yet. Check back after the next cleaning.</div>';
    return;
  }

  // Reset lightbox sets
  _lbSets = [];

  var html = '';
  visits.forEach(function(v) {
    html += '<div class="visit-item">';
    html += '<div class="visit-hdr">';
    html += '<div class="visit-date">' + fmtShort(v.ts) + '</div>';
    html += '<div class="visit-crew">👤 ' + esc(v.crewLead||'Crew') + '</div>';
    html += '</div>';

    if (v.sections && Object.keys(v.sections).length) {
      // ── Sectioned visit (new format) ──────────────────────────────────
      Object.entries(v.sections).forEach(function(entry) {
        var secName  = entry[0];
        var secData  = entry[1];
        var secPhotos = Array.isArray(secData.photos) ? secData.photos.filter(Boolean) : [];
        if (!secPhotos.length && !secData.note) return; // skip empty sections

        html += '<div class="scope-section">';
        html += '<div class="scope-section-title">' + esc(secName) + '</div>';
        if (secData.note) html += '<div class="scope-note">' + esc(secData.note) + '</div>';

        if (secPhotos.length) {
          var setIdx = _lbSets.length;
          _lbSets.push(secPhotos);
          html += '<div class="visit-photos">';
          var limit = Math.min(secPhotos.length, 4);
          var extra = secPhotos.length - 4;
          for (var i = 0; i < limit; i++) {
            if (i === 3 && extra > 0) {
              html += '<div class="more-photos-tile" onclick="openSet(' + setIdx + ',3)">+' + (extra+1) + '</div>';
            } else {
              html += '<div class="visit-photo" onclick="openSet(' + setIdx + ',' + i + ')">';
              html += '<img src="' + esc(secPhotos[i]) + '" loading="lazy" onerror="this.parentNode.style.display=\'none\'">';
              html += '<div class="visit-photo-overlay"></div>';
              html += '</div>';
            }
          }
          html += '</div>';
        }
        html += '</div>'; // scope-section
      });
    } else {
      // ── Legacy flat visit (no sections) ──────────────────────────────
      var vPhotos = Array.isArray(v.photos) ? v.photos.filter(Boolean) : [];
      if (v.note) html += '<div class="scope-note">' + esc(v.note) + '</div>';
      if (vPhotos.length) {
        var setIdx = _lbSets.length;
        _lbSets.push(vPhotos);
        html += '<div class="visit-photos">';
        var limit2 = Math.min(vPhotos.length, 4);
        var extra2 = vPhotos.length - 4;
        for (var j = 0; j < limit2; j++) {
          if (j === 3 && extra2 > 0) {
            html += '<div class="more-photos-tile" onclick="openSet(' + setIdx + ',3)">+' + (extra2+1) + '</div>';
          } else {
            html += '<div class="visit-photo" onclick="openSet(' + setIdx + ',' + j + ')">';
            html += '<img src="' + esc(vPhotos[j]) + '" loading="lazy" onerror="this.parentNode.style.display=\'none\'">';
            html += '<div class="visit-photo-overlay"></div>';
            html += '</div>';
          }
        }
        html += '</div>';
      }
    }

    // General notes for sectioned visits
    if (v.note && v.sections) html += '<div class="visit-general-note">📝 ' + esc(v.note) + '</div>';

    html += '</div>'; // visit-item
  });
  body.innerHTML = html;
}

// ── Download service history as printable PDF ─────────────────────────────
function downloadServiceHistory() {
  if (!_visitsCache.length) return;
  var w = window.open('', '_blank');
  if (!w) { alert('Pop-up blocked — please allow pop-ups for this site.'); return; }

  var css = [
    '*{margin:0;padding:0;box-sizing:border-box}',
    'body{font-family:Outfit,Helvetica,Arial,sans-serif;color:#1A3C34;padding:40px 48px;max-width:900px;margin:0 auto}',
    'h1{font-size:22px;font-weight:700;margin-bottom:4px}',
    'h2{font-size:11px;color:#7A8B85;text-transform:uppercase;letter-spacing:1.2px;margin-bottom:24px}',
    '.meta{display:flex;justify-content:space-between;align-items:center;border-bottom:2px solid #D5E5DC;padding-bottom:12px;margin-bottom:24px}',
    '.meta-right{text-align:right;font-size:12px;color:#7A8B85}',
    '.visit{border:1px solid #D5E5DC;border-radius:8px;padding:16px 20px;margin-bottom:14px;page-break-inside:avoid}',
    '.visit-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}',
    '.visit-date{font-size:14px;font-weight:700;color:#1A3C34}',
    '.visit-crew{font-size:12px;color:#3E4A47}',
    '.section{margin:8px 0 4px;padding-left:12px;border-left:3px solid #A8D5BA}',
    '.section-title{font-size:12px;font-weight:700;color:#3A7D44;text-transform:uppercase;letter-spacing:0.8px;margin-bottom:4px}',
    '.note{font-size:13px;color:#3E4A47;margin:4px 0}',
    '.photos{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}',
    '.photos img{width:100px;height:75px;object-fit:cover;border-radius:4px;border:1px solid #D5E5DC}',
    '.footer{margin-top:32px;padding-top:16px;border-top:1px solid #D5E5DC;font-size:11px;color:#7A8B85;text-align:center}',
    '@media print{body{padding:20px 24px}.visit{break-inside:avoid}}',
  ].join('\n');

  var html = '<!DOCTYPE html><html><head><meta charset="utf-8"><title>Service History — ' + esc(_portalJobName) + '</title>';
  html += '<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">';
  html += '<style>' + css + '</style></head><body>';

  html += '<div class="meta">';
  html += '<div><h1>' + esc(_portalJobName) + '</h1><h2>Service History Report</h2></div>';
  html += '<div class="meta-right">Generated ' + new Date().toLocaleDateString('en-US', {year:'numeric',month:'long',day:'numeric'}) + '<br>' + _visitsCache.length + ' visit' + (_visitsCache.length!==1?'s':'') + ' on record</div>';
  html += '</div>';

  _visitsCache.forEach(function(v) {
    var d = v.ts ? new Date(v.ts) : null;
    var dateStr = d ? d.toLocaleDateString('en-US', {weekday:'short',year:'numeric',month:'short',day:'numeric'}) : 'Unknown date';
    var timeStr = d ? d.toLocaleTimeString('en-US', {hour:'numeric',minute:'2-digit'}) : '';

    html += '<div class="visit">';
    html += '<div class="visit-head">';
    html += '<div class="visit-date">' + esc(dateStr) + (timeStr ? ' · ' + esc(timeStr) : '') + '</div>';
    html += '<div class="visit-crew">Crew: ' + esc(v.crewLead||'—') + '</div>';
    html += '</div>';

    if (v.sections && Object.keys(v.sections).length) {
      Object.entries(v.sections).forEach(function(entry) {
        var secName = entry[0], secData = entry[1];
        var secPhotos = Array.isArray(secData.photos) ? secData.photos.filter(Boolean) : [];
        if (!secPhotos.length && !secData.note) return;
        html += '<div class="section">';
        html += '<div class="section-title">' + esc(secName) + '</div>';
        if (secData.note) html += '<div class="note">' + esc(secData.note) + '</div>';
        if (secPhotos.length) {
          html += '<div class="photos">';
          secPhotos.forEach(function(url) { html += '<img src="' + esc(url) + '" onerror="this.style.display=\'none\'">'; });
          html += '</div>';
        }
        html += '</div>';
      });
    } else {
      if (v.note) html += '<div class="note">' + esc(v.note) + '</div>';
      var flat = Array.isArray(v.photos) ? v.photos.filter(Boolean) : [];
      if (flat.length) {
        html += '<div class="photos">';
        flat.forEach(function(url) { html += '<img src="' + esc(url) + '" onerror="this.style.display=\'none\'">'; });
        html += '</div>';
      }
    }

    if (v.note && v.sections) html += '<div class="note" style="margin-top:8px;font-style:italic;">General: ' + esc(v.note) + '</div>';
    html += '</div>';
  });

  html += '<div class="footer">HuronWest Facility Services LLC · Service History Report · ' + esc(_portalJobName) + '</div>';
  html += '</body></html>';

  w.document.write(html);
  w.document.close();
  // Auto-trigger print dialog after images load
  w.onload = function() { w.print(); };
}

// ── Update message thread (called by real-time listener) ──────────────────
function updateMessages(snap) {
  var thread = document.getElementById('msg-thread');
  if (!thread) return;

  var data = snap.val();
  var msgs = data ? Object.values(data) : [];
  msgs.sort(function(a,b){ return (a.ts||'').localeCompare(b.ts||''); });

  if (!msgs.length) {
    thread.innerHTML = '<div class="empty-msgs">No messages yet. Send one below!</div>';
    return;
  }

  var html = '';
  msgs.forEach(function(m) {
    var fromHW = m.from === 'hw';
    html += '<div class="msg-bubble ' + (fromHW ? 'msg-from-hw' : 'msg-from-client') + '">';
    html += '<div class="msg-meta">' + esc(fromHW ? 'HuronWest' : (m.name||'You')) + ' · ' + timeAgo(m.ts) + '</div>';
    html += '<div>' + esc(m.text) + '</div>';
    if (m.reply) {
      html += '<div class="msg-reply">';
      html += '<div class="msg-reply-meta">HuronWest replied · ' + timeAgo(m.reply.ts) + '</div>';
      html += '<div>' + esc(m.reply.text) + '</div></div>';
    } else if (m.read) {
      html += '<div style="font-size:11px;color:var(--bark-lt);margin-top:6px;text-align:right">✓ Seen by HuronWest</div>';
    }
    html += '</div>';
  });
  thread.innerHTML = html;
  // Auto-scroll to latest
  thread.scrollTop = thread.scrollHeight;
}

// ── Send message ───────────────────────────────────────────────────────────
function doSend() {
  var nameEl = document.getElementById('msg-name');
  var textEl = document.getElementById('msg-text');
  var btn    = document.getElementById('send-btn');
  var name   = (nameEl.value||'').trim();
  var text   = (textEl.value||'').trim();
  if (!name) { nameEl.focus(); showToast('Please enter your name.', true); return; }
  if (!text) { textEl.focus(); showToast('Please type a message.', true); return; }

  localStorage.setItem('hwfs-portal-name', name);

  btn.disabled = true; btn.textContent = 'Sending…';
  var id  = 'msg' + Date.now() + Math.random().toString(36).slice(2,5);
  var msg = { id:id, jobId:jobId, from:'client', name:name, text:text, ts:new Date().toISOString(), read:false };

  db.ref('hwfs-os/messages/' + jobId + '/' + id).set(msg)
    .then(function() {
      textEl.value = '';
      showToast('Message sent! We\'ll respond shortly.');
    })
    .catch(function(e) { showToast('Send failed — try again.', true); })
    .finally(function() { btn.disabled = false; btn.textContent = 'Send Message'; });
}

// ── Toast ──────────────────────────────────────────────────────────────────
function showToast(msg, error) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = error ? '#C62828' : '#3A7D44';
  t.classList.add('show');
  clearTimeout(t._t);
  t._t = setTimeout(function(){ t.classList.remove('show'); }, 3500);
}

// ── Init ───────────────────────────────────────────────────────────────────
(async function init() {
  jobId = getJobId();
  if (!jobId) {
    document.getElementById('loading').innerHTML = '<div class="container"><div class="error-box">No job ID in URL. This link may be invalid.</div></div>';
    return;
  }

  cfg = await getConfig();
  if (!cfg || !cfg.databaseURL) {
    document.getElementById('loading').innerHTML =
      '<div class="loading"><div class="loading-title">Setup Required</div>' +
      '<div class="loading-sub" style="max-width:400px;margin:0 auto">Open the <a href="/" style="color:var(--leaf)">HuronWest ERP</a>, go to Settings → Firebase Sync, and connect Firebase. Then return to this page.</div></div>';
    return;
  }

  if (!initFirebase(cfg)) {
    document.getElementById('loading').innerHTML = '<div class="container"><div class="error-box">Firebase initialization failed. Please contact HuronWest.</div></div>';
    return;
  }

  // Load portal data (once)
  var snap = await db.ref('hwfs-os/portal/' + jobId).once('value');
  var job  = snap.val();

  if (!job) {
    document.getElementById('loading').innerHTML = '<div class="loading"><div class="error-box">Portal not found. This link may be expired or invalid.</div></div>';
    return;
  }
  if (!job.portalEnabled) {
    document.getElementById('loading').innerHTML = '<div class="loading"><div class="error-box">This portal is not currently active. Please contact HuronWest directly.</div></div>';
    return;
  }

  // Render static frame
  renderFrame(job);

  // Attach real-time listeners — updates happen automatically
  db.ref('hwfs-os/visits/'   + jobId).on('value', updateVisits,   function(e){ console.warn('visits error', e); });
  db.ref('hwfs-os/messages/' + jobId).on('value', updateMessages, function(e){ console.warn('messages error', e); });
})();
</script>
