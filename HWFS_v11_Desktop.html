            {PR("Depreciation",E.deprW,{i:true})}{PR("EBIT",E.ebitW,{b:true})}{PR("Tax ("+pct(data.S.taxRate)+")",E.taxW,{i:true})}

          <tbody>
            <tr><td style={{...ss.td,fontWeight:700,color:T.accent}} colSpan={5}>ASSETS</td></tr>

        {tab==="inv"&&<InvTab data={data} upd={upd} E={E} ss={ss} T={T} F={F} Badge={Badge} updA={updA}/>}
        {tab==="rev"&&<div style={ss.card}><div style={ss.ch}><span>Consolidated Revenue</span></div>
          {(()=>{const aj=data.jobs.filter(j=>j.active&&!j.pipe);const byClient={};aj.forEach(j=>{const c=j.client||"Other";if(!byClient[c])byClient[c]={wkRev:0,n:0,sf:0};byClient[c].wkRev+=(+j.wkRate||0);byClient[c].n++;byClient[c].sf+=(+j.sf||0)});const byTier={};aj.forEach(j=>{const t=j.tier||"Basic";if(!byTier[t])byTier[t]={wkRev:0,n:0};byTier[t].wkRev+=(+j.wkRate||0);byTier[t].n++});const maxR=Math.max(1,...Object.values(byClient).map(c=>c.wkRev));

          <div style={ss.card}><div style={ss.ch}><span>By Tier</span></div><table style={ss.tbl}><thead><tr><th style={ss.th}>Tier</th><th style={ss.thR}>#</th><th style={ss.thR}>$/Wk</th><th style={ss.thR}>% of Total</th></tr></thead><tbody>{Object.entries(byTier).sort((a,b)=>b[1].wkRev-a[1].wkRev).map(([t,d])=><tr key={t}><td style={ss.td}><Badge c={TIERS[t]?.color||T.accent}>{t}</Badge></td><td style={ss.tdR}>{d.n}</td><td style={{...ss.tdR,fontWeight:700}}>{fmtF(d.wkRev)}</td><td style={ss.tdR}>{pct(E.wR>0?d.wkRev/E.wR:0)}</td></tr>)}</tbody></table></div></div></>})()}

        {tab==="spec"&&<SpecTab data={data} upd={upd} E={E} ss={ss} T={T} F={F} Badge={Badge}/>}

        {tab==="actions"&&<ActTab data={data} upd={upd} setData={setData} ss={ss} T={T} F={F} Tog={Tog} Badge={Badge}/>}
        {tab==="cfg"&&<CfgTab data={data} updS={updS} updA={updA} setData={setData} ss={ss} T={T} F={F}/>}
      </div>

  </div>);
}



// ═══ MENU BAR ═══
function MenuBar({doExport,doImport,doPDF,ss,T}){
  const[open,setOpen]=useState(false);
  const ref=useRef(null);
  useEffect(()=>{
    const handler=(e)=>{if(ref.current&&!ref.current.contains(e.target))setOpen(false)};
    document.addEventListener("mousedown",handler);
    return()=>document.removeEventListener("mousedown",handler);
  },[]);
  const items=[{l:"Export Backup (.json)",fn:doExport},{l:"Import Backup (.json)",fn:doImport},{l:"---"},{l:"Print / Save as PDF",fn:doPDF},{l:"---"},{l:"Weekly Digest",fn:()=>doDigest()}];
  return(<div ref={ref} style={{position:"relative",display:"inline-block"}}>

// ═══ NOTIFICATION BELL ═══
function NotifBell({notifs,T,ss}){
  const[open,setOpen]=useState(false);
  const ref=useRef(null);
  useEffect(()=>{
    const handler=(e)=>{if(ref.current&&!ref.current.contains(e.target))setOpen(false)};
    document.addEventListener("mousedown",handler);
    return()=>document.removeEventListener("mousedown",handler);
  },[]);
  const hasRed=notifs.some(n=>n.type==="red");
  return(<div ref={ref} style={{position:"relative",display:"inline-block"}}>
    <button onClick={()=>setOpen(!open)} style={{background:"transparent",border:"none",cursor:"pointer",fontSize:18,position:"relative",padding:"2px 6px",color:hasRed?T.red:notifs.length>0?T.yellow:T.td2}}>

    </button>

// ═══ INBOX & APPROVALS ═══
function InboxTab({data,upd,setData,ss,T,F,Badge}){
  const pending=data.pending||[];
  const posted=data.postedExpenses||[];
  const approve=(item)=>{
    const approved={...item,status:"approved",approvedBy:data.userId,approvedAt:new Date().toISOString()};
    if(item.type==="expense"){
      setData(prev=>{const nd={...prev,
        expenses:[...prev.expenses,approved],
        pending:(prev.pending||[]).filter(p=>p.id!==item.id),
        postedExpenses:[...(prev.postedExpenses||[]),approved],
        activityLog:[{id:uid(),ts:new Date().toISOString(),user:prev.userId,action:"Approved expense",detail:item.desc+" $"+item.amt},...(prev.activityLog||[]).slice(0,99)]
      };try{localStorage.setItem(SK,JSON.stringify(nd))}catch(e){}return nd});
    }
  };
  const reject=(item)=>{
    setData(prev=>{const nd={...prev,
      pending:(prev.pending||[]).filter(p=>p.id!==item.id),
      activityLog:[{id:uid(),ts:new Date().toISOString(),user:prev.userId,action:"Rejected",detail:item.desc},...(prev.activityLog||[]).slice(0,99)]
    };try{localStorage.setItem(SK,JSON.stringify(nd))}catch(e){}return nd});
  };
  // CSV Import
  const doCSV=()=>{
    const inp=document.createElement("input");inp.type="file";inp.accept=".csv";
    inp.onchange=e=>{const f=e.target.files[0];if(!f)return;
      const r=new FileReader();r.onload=ev=>{
        try{
          const lines=ev.target.result.split("\n").filter(l=>l.trim());
          if(lines.length<2){alert("CSV needs header + data rows");return}
          const headers=lines[0].split(",").map(h=>h.trim().toLowerCase().replace(/"/g,""));
          const dateIdx=headers.findIndex(h=>h.includes("date"));
          const descIdx=headers.findIndex(h=>h.includes("desc")||h.includes("memo")||h.includes("name"));
          const amtIdx=headers.findIndex(h=>h.includes("amount")||h.includes("amt")||h.includes("total")||h.includes("debit"));
          const catIdx=headers.findIndex(h=>h.includes("cat")||h.includes("category")||h.includes("type"));
          if(descIdx===-1||amtIdx===-1){alert("CSV must have description and amount columns");return}
          const items=lines.slice(1).map(line=>{
            const cols=line.split(",").map(c=>c.trim().replace(/"/g,""));
            const amt=Math.abs(parseFloat(cols[amtIdx])||0);
            if(amt===0)return null;
            return{id:uid(),date:cols[dateIdx]||td(),desc:cols[descIdx]||"Imported",amt,cat:cols[catIdx]||"Misc",by:"HWFS",cap:false,dep:false,life:7,su:false,rec:false,rf:"monthly",submittedBy:"CSV Import",submittedAt:new Date().toISOString(),status:"pending",type:"expense"};
          }).filter(Boolean);
          if(items.length===0){alert("No valid rows found");return}
          setData(prev=>{const nd={...prev,pending:[...(prev.pending||[]),...items]};try{localStorage.setItem(SK,JSON.stringify(nd))}catch(e){}return nd});
          alert("Imported "+items.length+" items to approval queue");
        }catch(err){alert("CSV error: "+err.message)}
      };r.readAsText(f);
    };inp.click();
  };

  return(<>
    <div style={ss.g3}>
      {[["Pending",pending.length,T.orange],["Approved (All Time)",posted.length,T.green],["This Session",posted.filter(p=>p.approvedBy===data.userId).length,T.accent]].map(([l,v,c],i)=><div key={i} style={{...ss.card,textAlign:"center"}}><div style={{fontSize:22,fontWeight:800,color:c}}>{v}</div><div style={{fontSize:9,color:T.td2,textTransform:"uppercase",marginTop:3}}>{l}</div></div>)}
    </div>
    <div style={ss.card}>
      <div style={ss.ch}><span>Approval Queue ({pending.length})</span>
        <div style={{display:"flex",gap:8}}>
          <button style={ss.btn} onClick={doCSV}>{"\ud83d\udcc4"} Import CSV</button>
          {pending.length>0&&<button style={{...ss.btn,background:T.green}} onClick={()=>{pending.forEach(item=>approve(item))}}>Approve All</button>}
        </div>
      </div>
      {pending.length===0&&<div style={{padding:20,textAlign:"center",color:T.td2,fontSize:13}}>No items pending approval</div>}
      <table style={ss.tbl}>
        {pending.length>0&&<thead><tr>{["Date","Description","Amount","Category","Submitted By","Time","",""].map((h,i)=><th key={i} style={i===2?ss.thR:ss.th}>{h}</th>)}</tr></thead>}
        <tbody>{pending.map(item=><tr key={item.id}>
          <td style={ss.td}>{item.date}</td>
          <td style={{...ss.td,fontWeight:600}}>{item.desc}</td>
          <td style={{...ss.tdR,fontWeight:700}}>{fmtF(item.amt)}</td>
          <td style={ss.td}><Badge>{item.cat||"Misc"}</Badge></td>
          <td style={ss.td}>{item.submittedBy}</td>
          <td style={{...ss.td,fontSize:11,color:T.td2}}>{item.submittedAt?new Date(item.submittedAt).toLocaleDateString():""}</td>
          <td style={ss.td}><button style={{...ss.btn,padding:"4px 12px",fontSize:11,background:T.green}} onClick={()=>approve(item)}>{"\u2713"} Approve</button></td>
          <td style={ss.td}><button style={{...ss.btnD}} onClick={()=>reject(item)}>{"\u2715"}</button></td>
        </tr>)}</tbody>
      </table>
    </div>
    <div style={ss.card}>
      <div style={ss.ch}><span>Settings</span></div>
      <div style={ss.g3}>
        <F l="Auto-approve threshold ($)"><input type="number" style={ss.inp} value={data.approvalThreshold||500} onChange={e=>{const val=+e.target.value;setData(prev=>{const nd={...prev,approvalThreshold:val};try{localStorage.setItem(SK,JSON.stringify(nd))}catch(er){}return nd})}}/></F>
        <F l="CSV Format Info"><div style={{fontSize:11,color:T.ts,padding:8,background:T.bg2,borderRadius:4}}>CSV headers: date, description/memo, amount/debit, category (optional). Auto-maps common bank export formats.</div></F>
      </div>
    </div>
    {posted.length>0&&<div style={ss.card}>
      <div style={ss.ch}><span>Approval History ({posted.length})</span></div>
      <div style={{maxHeight:300,overflowY:"auto"}}><table style={ss.tbl}>
        <thead><tr>{["Date","Description","Amount","Approved By","When"].map((h,i)=><th key={i} style={i===2?ss.thR:ss.th}>{h}</th>)}</tr></thead>
        <tbody>{posted.slice().reverse().slice(0,25).map(item=><tr key={item.id}>
          <td style={ss.td}>{item.date}</td><td style={{...ss.td,fontWeight:600}}>{item.desc}</td>
          <td style={{...ss.tdR,fontWeight:700}}>{fmtF(item.amt)}</td>
          <td style={ss.td}><Badge c={T.green}>{item.approvedBy}</Badge></td>
          <td style={{...ss.td,fontSize:11,color:T.td2}}>{item.approvedAt?new Date(item.approvedAt).toLocaleDateString():""}</td>
        </tr>)}</tbody>
      </table></div>
    </div>}
  </>);
}

// ═══ ACTIONS ═══
function ActTab({data,upd,setData,ss,T,F,Tog,Badge}){
  const[f,setF]=useState({text:"",priority:"Medium",due:"",assignee:"Rob"});
  const add=()=>{if(!f.text)return;upd("actions",[...data.actions,{...f,id:uid(),done:false,created:td()}]);setF({...f,text:"",due:""})};
  const rm=id=>upd("actions",data.actions.filter(a=>a.id!==id));
  const tog=id=>upd("actions",data.actions.map(a=>a.id===id?{...a,done:!a.done}:a));
  const open=data.actions.filter(a=>!a.done);const done=data.actions.filter(a=>a.done);
  return(<>
    <div style={ss.card}><div style={ss.ch}><span>+ Task</span></div>
      <div style={ss.g4}>
        <F l="Task"><input style={ss.inp} value={f.text} onChange={e=>setF({...f,text:e.target.value})} onKeyDown={e=>e.key==="Enter"&&add()}/></F>
        <F l="Priority"><select style={ss.sel} value={f.priority} onChange={e=>setF({...f,priority:e.target.value})}>{["Critical","High","Medium","Low"].map(v=><option key={v}>{v}</option>)}</select></F>
        <F l="Due"><input type="date" style={ss.inp} value={f.due} onChange={e=>setF({...f,due:e.target.value})}/></F>
        <F l="Who"><select style={ss.sel} value={f.assignee} onChange={e=>setF({...f,assignee:e.target.value})}>{["Rob","Nico","Both"].map(v=><option key={v}>{v}</option>)}</select></F>
      </div><button style={ss.btn} onClick={add}>+ Add</button>
    </div>
    <div style={ss.card}><div style={ss.ch}><span>Open ({open.length})</span></div>
      <table style={ss.tbl}><thead><tr>{["\u2713","Task","Priority","Due","Who",""].map((h,i)=><th key={i} style={ss.th}>{h}</th>)}</tr></thead>
      <tbody>{open.map(a=><tr key={a.id}><td style={ss.td}><Tog v={a.done} onChange={()=>tog(a.id)}/></td>
          <td style={ss.td}><input style={{...ss.inp,padding:"2px 4px",fontSize:11,fontWeight:600}} value={a.text||""} onChange={ev=>{const v=ev.target.value;const aid=a.id;setData(prev=>{const nd={...prev,actions:prev.actions.map(x=>x.id===aid?{...x,text:v}:x)};try{localStorage.setItem(SK,JSON.stringify(nd))}catch(er){}return nd})}}/></td>
          <td style={ss.td}><select style={{...ss.sel,padding:"2px 4px",fontSize:10}} value={a.priority} onChange={ev=>{const v=ev.target.value;const aid=a.id;setData(prev=>{const nd={...prev,actions:prev.actions.map(x=>x.id===aid?{...x,priority:v}:x)};try{localStorage.setItem(SK,JSON.stringify(nd))}catch(er){}return nd})}}>{["Critical","High","Medium","Low"].map(v=><option key={v}>{v}</option>)}</select></td>
          <td style={ss.td}><input type="date" style={{...ss.inp,padding:"2px 4px",fontSize:10}} value={a.due||""} onChange={ev=>{const v=ev.target.value;const aid=a.id;setData(prev=>{const nd={...prev,actions:prev.actions.map(x=>x.id===aid?{...x,due:v}:x)};try{localStorage.setItem(SK,JSON.stringify(nd))}catch(er){}return nd})}}/></td>
          <td style={ss.td}><select style={{...ss.sel,padding:"2px 4px",fontSize:10}} value={a.assignee||"Rob"} onChange={ev=>{const v=ev.target.value;const aid=a.id;setData(prev=>{const nd={...prev,actions:prev.actions.map(x=>x.id===aid?{...x,assignee:v}:x)};try{localStorage.setItem(SK,JSON.stringify(nd))}catch(er){}return nd})}}>{["Rob","Nico","Both"].map(v=><option key={v}>{v}</option>)}</select></td><td style={ss.td}><button style={ss.btnD} onClick={()=>rm(a.id)}>{"\u2715"}</button></td></tr>)}</tbody></table>
    </div>
    {done.length>0&&<div style={ss.card}><div style={ss.ch}><span>Done ({done.length})</span></div>
      <table style={ss.tbl}><tbody>{done.map(a=><tr key={a.id} style={{opacity:.4}}><td style={ss.td}><Tog v={a.done} onChange={()=>tog(a.id)}/></td><td style={{...ss.td,textDecoration:"line-through"}}>{a.text}</td><td style={ss.td}>{a.due}</td><td style={ss.td}>{a.assignee}</td><td style={ss.td}><button style={ss.btnD} onClick={()=>rm(a.id)}>{"\u2715"}</button></td></tr>)}</tbody></table>
    </div>}
  </>);
}
