<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self'; style-src 'unsafe-inline'"/>
  <title>HuronWest — Connection Required</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: #0b0e15;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', 'Inter', Arial, sans-serif;
      color: #e8eaf0;
      -webkit-app-region: drag;
    }

    .card {
      text-align: center;
      max-width: 440px;
      padding: 0 32px;
      -webkit-app-region: no-drag;
    }

    /* Hex logo */
    .logo { width: 80px; height: 80px; margin: 0 auto 28px; }

    .brand {
      font-size: 28px;
      font-weight: 700;
      color: #e8eaf0;
      letter-spacing: -0.5px;
      margin-bottom: 6px;
    }

    .tagline {
      font-size: 11px;
      color: #5B8C7E;
      text-transform: uppercase;
      letter-spacing: 2.5px;
      margin-bottom: 48px;
    }

    .status-dot {
      display: inline-block;
      width: 9px; height: 9px;
      border-radius: 50%;
      background: #ef5350;
      margin-right: 8px;
      vertical-align: middle;
      position: relative;
      top: -1px;
    }

    h2 {
      font-size: 18px;
      font-weight: 600;
      color: #e8eaf0;
      margin-bottom: 14px;
    }

    p {
      font-size: 14px;
      color: #8892a0;
      line-height: 1.7;
      margin-bottom: 36px;
    }

    button {
      background: #3A7D44;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 13px 36px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.5px;
      transition: background 0.15s, opacity 0.15s;
      -webkit-app-region: no-drag;
    }
    button:hover:not(:disabled) { background: #4a9457; }
    button:disabled { opacity: 0.55; cursor: not-allowed; }

    .hint {
      margin-top: 18px;
      font-size: 12px;
      color: #3a4860;
      min-height: 18px;
      transition: color 0.2s;
    }
    .hint.error { color: #ef9090; }
  </style>
</head>
<body>
  <div class="card">
    <!-- HuronWest hex logo (matches app branding) -->
    <svg class="logo" viewBox="0 0 100 100" fill="none">
      <polygon points="50,5 93,27.5 93,72.5 50,95 7,72.5 7,27.5"
        fill="none" stroke="#3A7D44" stroke-width="3"/>
      <polygon points="50,20 78,35 78,65 50,80 22,65 22,35"
        fill="#3A7D44" opacity="0.25"/>
      <text x="50" y="59" text-anchor="middle"
        fill="#A8D5BA" font-size="27" font-weight="800"
        font-family="'Segoe UI', Arial, sans-serif">HW</text>
    </svg>

    <div class="brand">HuronWest</div>
    <div class="tagline">Facility Services &middot; ERP</div>

    <h2><span class="status-dot"></span>Connection Required</h2>
    <p>
      An active internet connection is needed to load<br/>
      the HuronWest ERP. Please check your network<br/>
      and click <strong>Retry</strong> when ready.
    </p>

    <button id="btn">Retry Connection</button>
    <div class="hint" id="hint"></div>
  </div>

  <script>
    const btn  = document.getElementById('btn');
    const hint = document.getElementById('hint');

    btn.addEventListener('click', async () => {
      btn.disabled    = true;
      btn.textContent = 'Checking\u2026';
      hint.textContent = '';
      hint.className   = 'hint';

      const ok = await window.electronAPI.retry();

      if (!ok) {
        btn.disabled    = false;
        btn.textContent = 'Retry Connection';
        hint.textContent = 'Still offline \u2014 check your network and try again.';
        hint.className   = 'hint error';
      }
      // If ok === true, main.js loads APP_URL and this page is replaced
    });
  </script>
</body>
</html>
